<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #C6B087, #296591);
            padding: 25px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        .dashboard-grid {
            display: flex;
            gap: 25px;
        }

        h1 {
            text-align: center;
            color: #E1F0FA;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .search-wrapper {
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 30px;
            border: 2px solid #B8D8E8;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #cc9780;
        }

        button {
            padding: 12px 28px;
            background:#094969;
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover {
            background: #095175;
            transform: scale(1.02);
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            border-left: 5px solid #094969;
            margin-bottom: 10px;
            background: #f4f9fc;
            border-radius: 0 10px 10px 0;
        }

        .history-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .history-btn {
            padding: 8px 18px;
            border-radius: 25px;
            background: #E1F0FA;
            color: #0B2F4E;
            border: 1px solid #9BC4D9;
            cursor: pointer;
            transition: 0.15s;
        }

        .history-btn:hover {
            background: #094969;
            color: white;
            border-color: #094969;
        }

        @media (max-width:700px) {
            .dashboard-grid {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1> Weather Dashboard Pro</h1>

        <div class="dashboard-grid">
            <div class="glass-card">
                <h3> City Search</h3>
                <div class="search-wrapper">
                    <input id="cityInput" placeholder="Enter city name...">
                    <button id="searchBtn">Get Weather</button>
                </div>
                <br>
                <h3> Recent Searches</h3>
                <div class="history-panel" id="history"></div>
            </div>

            <div class="glass-card">
                <h3> Current Weather</h3>
                <div id="weather"></div>
            </div>
        </div>

    </div>

    <script>
        const API_KEY = "63d1b39bd375d86da68e6740e4736d3f";
        
        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        
        let searchHistory = JSON.parse(localStorage.getItem('weatherSearches')) || [];

        async function getWeather(city) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("City not found. Please check the name.");
                throw new Error("City not found");
            }
            const data = await res.json();
            return data;
        }

        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        function renderWeather(d) {
            weatherBox.innerHTML = `
                <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
                <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
                <div class="weather-item"><label>Condition</label><span>${d.weather[0].main}</span></div>
                <div class="weather-item"><label> Humidity</label><span>${d.main.humidity}%</span></div>
                <div class="weather-item"><label> Wind</label><span>${d.wind.speed} m/s</span></div>
            `;
        }

        function saveHistory(city) {
            if (!searchHistory.includes(city)) {
                searchHistory.unshift(city);
                if (searchHistory.length > 6) {
                    searchHistory.pop();
                }
                localStorage.setItem('weatherSearches', JSON.stringify(searchHistory));
            }
            showHistory();
        }

        function showHistory() {
            if (searchHistory.length === 0) {
                historyBox.innerHTML = '<p style="color:#666;">No searches yet</p>';
                return;
            }
            
            let html = '';
            searchHistory.forEach(city => {
                html += `<button class="history-btn" onclick="search('${city}')">${city}</button>`;
            });
            historyBox.innerHTML = html;
        }

        async function search(city) {
            weatherBox.innerHTML = '<p style="color:#666;">Loading...</p>';
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
                cityInput.value = ''; 
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:#d9534f;"> ${error.message}</p>`;
            }
        }
       
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });

        showHistory();
    </script>
</body> 

</html>
